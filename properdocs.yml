# ─────────────────────────────────────────────────────────────────────────────
# PROJECT-SPECIFIC — change these when forking the template
# ─────────────────────────────────────────────────────────────────────────────
site_name: "PROJECT_NAME Documentation"
site_url: "https://iciq-dmp.github.io/PROJECT_NAME/"
repo_url: "https://github.com/iciq-dmp/PROJECT_NAME"
repo_name: "iciq-dmp/PROJECT_NAME"

# Source code repo from which API reference is generated.
# This value is also read by the CI workflow (see .github/workflows/deploy-docs.yml).
extra:
  source_repo: "iciq-dmp/PROJECT_NAME"
  project_name: "PROJECT_NAME"

# ─────────────────────────────────────────────────────────────────────────────
# COMMON — do not change; update in template-docs and sync to forks
# ─────────────────────────────────────────────────────────────────────────────
docs_dir: docs
site_dir: site

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search:
      lang: en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - minify:
      minify_html: true
  - redirects:
      redirect_maps: {}
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths: ["source"]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            show_if_no_docstring: false
            inherited_members: true
            show_bases: true

nav:
  - Home: index.md
  - Tutorials: tutorials/
  - How-To Guides: how-to/
  - Reference: reference/
  - Explanation: explanation/

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
