name: Docs

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read source repo from properdocs.yml
        id: config
        run: |
          SOURCE_REPO=$(python3 -c "
          import yaml
          yaml.add_multi_constructor(
              'tag:yaml.org,2002:python/',
              lambda loader, tag_suffix, node: loader.construct_scalar(node),
              Loader=yaml.SafeLoader,
          )
          with open('properdocs.yml') as f:
              cfg = yaml.safe_load(f)
          print(cfg['extra']['source_repo'])
          ")
          echo "source_repo=$SOURCE_REPO" >> "$GITHUB_OUTPUT"

      - name: Checkout source code repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.config.outputs.source_repo }}
          path: source

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build documentation site
        run: properdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  markdownlint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "docs/**/*.md"

  deploy:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
