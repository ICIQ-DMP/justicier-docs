name: Deploy Documentation

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read source repo from properdocs.yml
        id: config
        run: |
          SOURCE_REPO=$(awk '/source_repo:/ {print $2}' properdocs.yml)
          echo "source_repo=$SOURCE_REPO" >> "$GITHUB_OUTPUT"

      - name: Checkout source code repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.config.outputs.source_repo }}
          path: source
          # If the source repo is private, add a PAT secret:
          # token: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build documentation site
        run: properdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
