name: Lint

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "docs/**/*.md"

  build-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout docs repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read source repo from properdocs.yml
        id: config
        run: |
          SOURCE_REPO=$(python3 - <<'EOF'
import yaml
yaml.add_multi_constructor(
    'tag:yaml.org,2002:python/',
    lambda loader, tag_suffix, node: loader.construct_scalar(node),
    Loader=yaml.SafeLoader,
)
with open('properdocs.yml') as f:
    cfg = yaml.safe_load(f)
print(cfg['extra']['source_repo'])
EOF
)
          echo "source_repo=$SOURCE_REPO" >> "$GITHUB_OUTPUT"

      - name: Checkout source code repo
        uses: actions/checkout@v4
        with:
          repository: ${{ steps.config.outputs.source_repo }}
          path: source

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build check
        run: properdocs build --strict
